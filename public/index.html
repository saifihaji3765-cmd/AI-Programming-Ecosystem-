<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI Dev Mentor Pro</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  height:100vh;
  display:flex;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
  width:260px;
  background:#111827;
  border-right:1px solid #1f2937;
  display:flex;
  flex-direction:column;
}

.logo{
  padding:22px;
  font-size:24px;
  font-weight:bold;
  border-bottom:1px solid #1f2937;
}

.history{
  flex:1;
  overflow-y:auto;
  padding:18px;
}

.history-title{
  color:#60a5fa;
  margin-bottom:16px;
  font-size:18px;
}

.history-item{
  background:#1f2937;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  cursor:pointer;
}

.history-item:hover{
  background:#374151;
}

/* =========================
   MAIN
========================= */

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.welcome{
  text-align:center;
  margin-top:80px;
}

.welcome h1{
  font-size:42px;
  margin-bottom:12px;
}

.welcome p{
  color:#94a3b8;
  font-size:18px;
}

/* =========================
   INPUT AREA
========================= */

.input-area{
  background:#111827;
  border-top:1px solid #1f2937;
  padding:20px;
}

textarea{
  width:100%;
  height:130px;
  background:#1f2937;
  color:white;
  border:none;
  outline:none;
  resize:none;
  border-radius:16px;
  padding:18px;
  font-size:16px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

button{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.9;
}

select{
  background:#1f2937;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
}

/* =========================
   OUTPUT
========================= */

.message{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:22px;
  margin-bottom:22px;
}

.section{
  margin-top:22px;
}

.section-title{
  color:#60a5fa;
  font-size:20px;
  margin-bottom:10px;
}

.code-box{
  background:#020617;
  border:1px solid #334155;
  border-radius:14px;
  overflow:hidden;
}

.code-top{
  background:#111827;
  border-bottom:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
}

.copy-btn{
  background:#2563eb;
  padding:8px 12px;
  border-radius:8px;
  font-size:14px;
}

pre{
  overflow-x:auto;
  white-space:pre-wrap;
  line-height:1.6;
  padding:18px;
  color:#e2e8f0;
}

.download-btn{
  display:inline-block;
  background:#16a34a;
  color:white;
  text-decoration:none;
  padding:14px 18px;
  border-radius:10px;
  margin-top:20px;
  font-weight:bold;
}

/* =========================
   ACTIVE PROJECT
========================= */

.active-project{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:12px;
  padding:14px;
  margin-bottom:18px;
}

.active-project-title{
  color:#22c55e;
  margin-bottom:8px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

  .sidebar{
    display:none;
  }

  .welcome h1{
    font-size:30px;
  }

}

</style>

</head>

<body>

<!-- =========================
     SIDEBAR
========================= -->

<div class="sidebar">

  <div class="logo">
    🚀 AI Dev Mentor
  </div>

  <div class="history">

    <div class="active-project">

      <div class="active-project-title">
        🟢 Active Project
      </div>

      <div id="activeProjectName">
        No project loaded
      </div>

    </div>

    <div class="history-title">
      📂 History
    </div>

    <div id="historyList"></div>

  </div>

</div>

<!-- =========================
     MAIN
========================= -->

<div class="main">

  <div class="chat" id="chat">

    <div class="welcome">

      <h1>Build Anything with AI</h1>

      <p>
        Generate projects, review architecture and evolve apps with AI.
      </p>

    </div>

  </div>

  <!-- =========================
       INPUT AREA
  ========================= -->

  <div class="input-area">

    <textarea
      id="prompt"
      placeholder="Ask AI anything..."
    ></textarea>

    <div class="controls">

      <select id="mode">

        <option value="analyze">
          💻 Analyze Code
        </option>

        <option value="project">
          🏗 Generate Project
        </option>

        <option value="review">
          🧠 Engineering Review
        </option>

        <option value="edit">
          ✏ Edit Project
        </option>

      </select>

      <select id="language">

        <option>javascript</option>
        <option>python</option>
        <option>java</option>
        <option>cpp</option>

      </select>

      <button onclick="runAI()">
        🚀 Run AI
      </button>

      <button onclick="clearHistory()">
        🗑 Clear
      </button>

    </div>

  </div>

</div>

<script>

/* =========================
   HISTORY
========================= */

let historyData = JSON.parse(
  localStorage.getItem("ai_history")
) || [];

/* =========================
   SAVE HISTORY
========================= */

function saveHistory(title,content){

  historyData.unshift({
    title,
    content
  });

  localStorage.setItem(
    "ai_history",
    JSON.stringify(historyData)
  );

  renderHistory();

}

/* =========================
   RENDER HISTORY
========================= */

function renderHistory(){

  const list =
    document.getElementById("historyList");

  list.innerHTML = "";

  historyData.forEach(item => {

    const div =
      document.createElement("div");

    div.className = "history-item";

    div.innerText = item.title;

    div.onclick = () => {

      addHTML(item.content);

    };

    list.appendChild(div);

  });

}

/* =========================
   CLEAR HISTORY
========================= */

function clearHistory(){

  localStorage.removeItem(
    "ai_history"
  );

  historyData = [];

  renderHistory();

}

/* =========================
   COPY CODE
========================= */

function copyCode(id){

  const text =
    document.getElementById(id).innerText;

  navigator.clipboard.writeText(text);

  alert("Copied");

}

/* =========================
   ADD HTML
========================= */

function addHTML(html){

  const chat =
    document.getElementById("chat");

  const div =
    document.createElement("div");

  div.className = "message";

  div.innerHTML = html;

  chat.appendChild(div);

  chat.scrollTop =
    chat.scrollHeight;

}

/* =========================
   LOAD ACTIVE PROJECT
========================= */

async function loadActiveProject(){

  try {

    const res =
      await fetch(
        "/get-project-memory"
      );

    const data =
      await res.json();

    if(
      data &&
      data.projectName
    ){

      document.getElementById(
        "activeProjectName"
      ).innerText =
        data.projectName;

    }

  } catch(err){

    console.log(err);

  }

}

/* =========================
   RUN AI
========================= */

async function runAI(){

  const prompt =
    document.getElementById(
      "prompt"
    ).value;

  const mode =
    document.getElementById(
      "mode"
    ).value;

  const language =
    document.getElementById(
      "language"
    ).value;

  addHTML(`
    <div class="section-title">
      🧠 AI Thinking...
    </div>
  `);

  /* =========================
     ANALYZE CODE
  ========================= */

  if(mode === "analyze"){

    const res =
      await fetch("/analyze", {

        method:"POST",

        headers:{
          "Content-Type":
          "application/json"
        },

        body:JSON.stringify({
          code:prompt,
          language
        })

      });

    const data =
      await res.json();

    const codeId =
      "fix_" + Date.now();

    const html = `

      <div class="section">

        <div class="section-title">
          🐞 Problems
        </div>

        <pre>
${(data.issues || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          ⚡ Fixes
        </div>

        <pre>
${(data.fixes || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          📘 Explanation
        </div>

        <pre>
${(data.explanation || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          💻 Fixed Code
        </div>

        <div class="code-box">

          <div class="code-top">

            <div>
              ${language}
            </div>

            <button
              class="copy-btn"
              onclick="copyCode('${codeId}')"
            >
              Copy
            </button>

          </div>

          <pre id="${codeId}">
${data.fixedCode || ""}
          </pre>

        </div>

      </div>

    `;

    addHTML(html);

    saveHistory(
      "💻 Analysis",
      html
    );

  }

  /* =========================
     ENGINEERING REVIEW
  ========================= */

  if(mode === "review"){

    const res =
      await fetch(
        "/engineering-review",
        {

          method:"POST",

          headers:{
            "Content-Type":
            "application/json"
          },

          body:JSON.stringify({
            code:prompt,
            language
          })

        }
      );

    const data =
      await res.json();

    const html = `

      <div class="section">

        <div class="section-title">
          🔒 Security
        </div>

        <pre>
${(data.securityIssues || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          ⚡ Performance
        </div>

        <pre>
${(data.performanceIssues || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          📈 Scalability
        </div>

        <pre>
${(data.scalabilityIssues || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          🏗 Architecture
        </div>

        <pre>
${(data.architectureReview || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          ✅ Best Practices
        </div>

        <pre>
${(data.bestPractices || []).join("\n\n")}
        </pre>

      </div>

    `;

    addHTML(html);

    saveHistory(
      "🧠 Engineering Review",
      html
    );

  }

  /* =========================
     GENERATE PROJECT
  ========================= */

  if(mode === "project"){

    const res =
      await fetch(
        "/generate-project",
        {

          method:"POST",

          headers:{
            "Content-Type":
            "application/json"
          },

          body:JSON.stringify({
            idea:prompt
          })

        }
      );

    const data =
      await res.json();

    document.getElementById(
      "activeProjectName"
    ).innerText =
      data.projectName;

    let filesHTML = "";

    (data.files || []).forEach(
      (file,index) => {

      const fileId =
        "file_" +
        index +
        "_" +
        Date.now();

      filesHTML += `

        <div class="section">

          <div class="section-title">
            📄 ${file.name}
          </div>

          <div class="code-box">

            <div class="code-top">

              <div>
                File
              </div>

              <button
                class="copy-btn"
                onclick="copyCode('${fileId}')"
              >
                Copy
              </button>

            </div>

            <pre id="${fileId}">
${file.content}
            </pre>

          </div>

        </div>

      `;

    });

    const html = `

      <div class="section">

        <div class="section-title">
          📦 Project
        </div>

        <pre>
${data.projectName}
        </pre>

      </div>

      ${filesHTML}

      <a
        href="/download-project"
        class="download-btn"
      >
        ⬇ Download ZIP
      </a>

    `;

    addHTML(html);

    saveHistory(
      data.projectName,
      html
    );

  }

  /* =========================
     EDIT PROJECT
  ========================= */

  if(mode === "edit"){

    const res =
      await fetch(
        "/edit-project",
        {

          method:"POST",

          headers:{
            "Content-Type":
            "application/json"
          },

          body:JSON.stringify({
            instruction:prompt
          })

        }
      );

    const data =
      await res.json();

    let filesHTML = "";

    (data.files || []).forEach(
      (file,index) => {

      const fileId =
        "edit_" +
        index +
        "_" +
        Date.now();

      filesHTML += `

        <div class="section">

          <div class="section-title">
            ✏ ${file.name}
          </div>

          <div class="code-box">

            <div class="code-top">

              <div>
                Updated File
              </div>

              <button
                class="copy-btn"
                onclick="copyCode('${fileId}')"
              >
                Copy
              </button>

            </div>

            <pre id="${fileId}">
${file.content}
            </pre>

          </div>

        </div>

      `;

    });

    const html = `

      <div class="section">

        <div class="section-title">
          🧠 Project Updated
        </div>

        <pre>
${data.summary || ""}
        </pre>

      </div>

      ${filesHTML}

    `;

    addHTML(html);

    saveHistory(
      "✏ Edited Project",
      html
    );

  }

}

/* =========================
   INIT
========================= */

renderHistory();

loadActiveProject();

</script>

</body>

</html>
