<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    AI Dev Mentor Pro
  </title>

  <link
    rel="stylesheet"
    href="styles.css"
  />

  <!-- Monaco Editor -->

  <script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>

</head>

<body>

  <!-- =========================
       SIDEBAR
  ========================== -->

  <div class="sidebar">

    <div class="logo">
      🚀 AI Dev Mentor
    </div>

    <div class="history">

      <!-- ACTIVE PROJECT -->

      <div class="active-project">

        <div class="active-project-title">
          🟢 Active Project
        </div>

        <div id="activeProjectName">
          No project loaded
        </div>

      </div>

      <!-- WORKFLOW -->

      <div
        id="workflowPanel"
        class="active-project"
        style="margin-top:15px;"
      >

        <div class="active-project-title">
          🧠 Suggested Steps
        </div>

        <div id="workflowSteps">

          No suggestions yet

        </div>

      </div>

      <!-- HISTORY -->

      <div class="history-title">
        📂 History
      </div>

      <div id="historyList"></div>

      <!-- FILES -->

      <div class="history-title">
        📁 Project Files
      </div>

      <div id="fileExplorer"></div>

    </div>

  </div>

  <!-- =========================
       MAIN AREA
  ========================== -->

  <div class="main">

    <!-- CHAT -->

    <div
      class="chat"
      id="chat"
    >

      <div class="welcome">

        <h1>
          Build Anything with AI
        </h1>

        <p>
          Generate projects, evolve systems and build complete software with AI.
        </p>

      </div>

    </div>

    <!-- INPUT -->

    <div class="input-area">

      <textarea
        id="prompt"
        placeholder="Ask AI anything..."
      ></textarea>

      <div class="controls">

        <!-- MODE -->

        <select id="mode">

          <option value="analyze">
            💻 Analyze Code
          </option>

          <option value="project">
            🏗 Generate Project
          </option>

          <option value="review">
            🧠 Engineering Review
          </option>

          <option value="edit">
            ✏ Edit Project
          </option>

        </select>

        <!-- LANGUAGE -->

        <select id="language">

          <option>
            javascript
          </option>

          <option>
            python
          </option>

          <option>
            java
          </option>

          <option>
            cpp
          </option>

        </select>

        <!-- BUTTONS -->

        <button onclick="runAI()">
          🚀 Run AI
        </button>

        <button onclick="clearHistory()">
          🗑 Clear
        </button>

      </div>

    </div>

  </div>

  <!-- =========================
       SCRIPTS
  ========================== -->

  <script src="app.js"></script>

  <script src="tabs.js"></script>

  <script src="editor.js"></script>

  <script src="explorer.js"></script>

  <script src="terminal.js"></script>

  <script src="preview.js"></script>
<script src="ai-editor.js"></script>
<script src="terminal-stream.js"></script>
<script src="terminal-ui.js"></script>
<script src="upload.js"></script>
</body>

</html>
