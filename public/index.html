<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI Dev Mentor Pro</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  height:100vh;
  display:flex;
}

.sidebar{
  width:280px;
  background:#111827;
  border-right:1px solid #1f2937;
  display:flex;
  flex-direction:column;
}

.logo{
  padding:22px;
  font-size:24px;
  font-weight:bold;
  border-bottom:1px solid #1f2937;
}

.history{
  flex:1;
  overflow-y:auto;
  padding:18px;
}

.history-title{
  color:#60a5fa;
  margin-bottom:16px;
  margin-top:18px;
  font-size:18px;
}

.history-item{
  background:#1f2937;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  cursor:pointer;
}

.history-item:hover{
  background:#374151;
}

.file-item{
  background:#0f172a;
  border:1px solid #334155;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
  font-size:14px;
  color:#cbd5e1;
}

.file-item:hover{
  background:#1e293b;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.welcome{
  text-align:center;
  margin-top:80px;
}

.welcome h1{
  font-size:42px;
  margin-bottom:12px;
}

.welcome p{
  color:#94a3b8;
  font-size:18px;
}

.input-area{
  background:#111827;
  border-top:1px solid #1f2937;
  padding:20px;
}

textarea{
  width:100%;
  height:130px;
  background:#1f2937;
  color:white;
  border:none;
  outline:none;
  resize:none;
  border-radius:16px;
  padding:18px;
  font-size:16px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

button{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.9;
}

select{
  background:#1f2937;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
}

.message{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:22px;
  margin-bottom:22px;
}

.section{
  margin-top:22px;
}

.section-title{
  color:#60a5fa;
  font-size:20px;
  margin-bottom:10px;
}

.code-box{
  background:#020617;
  border:1px solid #334155;
  border-radius:14px;
  overflow:hidden;
}

.code-top{
  background:#111827;
  border-bottom:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
}

.copy-btn{
  background:#2563eb;
  padding:8px 12px;
  border-radius:8px;
  font-size:14px;
}

pre{
  overflow-x:auto;
  white-space:pre-wrap;
  line-height:1.6;
  padding:18px;
  color:#e2e8f0;
}

.active-project{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:12px;
  padding:14px;
  margin-bottom:18px;
}

.active-project-title{
  color:#22c55e;
  margin-bottom:8px;
}

.editor-area{
  width:100%;
  height:500px;
  background:#020617;
  color:#e2e8f0;
  border:none;
  outline:none;
  padding:20px;
  font-family:monospace;
  font-size:14px;
  resize:vertical;
}

@media(max-width:900px){

  .sidebar{
    display:none;
  }

  .welcome h1{
    font-size:30px;
  }

}

</style>

</head>

<body>

<div class="sidebar">

  <div class="logo">
    🚀 AI Dev Mentor
  </div>

  <div class="history">

    <div class="active-project">

      <div class="active-project-title">
        🟢 Active Project
      </div>

      <div id="activeProjectName">
        No project loaded
      </div>

    </div>

    <div
      id="workflowPanel"
      class="active-project"
      style="margin-top:15px;"
    >

      <div class="active-project-title">
        🧠 Suggested Steps
      </div>

      <div id="workflowSteps">

        No suggestions yet

      </div>

    </div>

    <div class="history-title">
      📂 History
    </div>

    <div id="historyList"></div>

    <div class="history-title">
      📁 Project Files
    </div>

    <div id="fileExplorer"></div>

  </div>

</div>

<div class="main">

  <div class="chat" id="chat">

    <div class="welcome">

      <h1>Build Anything with AI</h1>

      <p>
        Generate projects, review architecture and evolve apps with AI.
      </p>

    </div>

  </div>

  <div class="input-area">

    <textarea
      id="prompt"
      placeholder="Ask AI anything..."
    ></textarea>

    <div class="controls">

      <select id="mode">

        <option value="analyze">
          💻 Analyze Code
        </option>

        <option value="project">
          🏗 Generate Project
        </option>

        <option value="review">
          🧠 Engineering Review
        </option>

        <option value="edit">
          ✏ Edit Project
        </option>

      </select>

      <select id="language">

        <option>javascript</option>
        <option>python</option>
        <option>java</option>
        <option>cpp</option>

      </select>

      <button onclick="runAI()">
        🚀 Run AI
      </button>

      <button onclick="clearHistory()">
        🗑 Clear
      </button>
<button onclick="openTerminal()">
  🖥 Terminal
</button>
      <a
        href="/download-project"
        target="_blank"
        style="
          background:#16a34a;
          color:white;
          text-decoration:none;
          padding:12px 18px;
          border-radius:10px;
          font-weight:bold;
        "
      >
        ⬇ Download ZIP
      </a>

    </div>

  </div>

</div>

<script>

let historyData = JSON.parse(
  localStorage.getItem("ai_history")
) || [];

/* =========================
   HISTORY
========================= */

function saveHistory(title,content){

  historyData.unshift({
    title,
    content
  });

  localStorage.setItem(
    "ai_history",
    JSON.stringify(historyData)
  );

  renderHistory();

}

function renderHistory(){

  const list =
    document.getElementById(
      "historyList"
    );

  if(!list) return;

  list.innerHTML = "";

  historyData.forEach(item => {

    const div =
      document.createElement("div");

    div.className =
      "history-item";

    div.innerText =
      item.title;

    div.onclick = () => {

      streamHTML(item.content);

    };

    list.appendChild(div);

  });

}

function clearHistory(){

  localStorage.removeItem(
    "ai_history"
  );

  historyData = [];

  renderHistory();

}

/* =========================
   COPY CODE
========================= */

function copyCode(id){

  const text =
    document.getElementById(id)
    .innerText;

  navigator.clipboard
    .writeText(text);

  alert("Copied");

}

/* =========================
   STREAM RESPONSE
========================= */

async function streamHTML(html){

  const chat =
    document.getElementById(
      "chat"
    );

  const div =
    document.createElement("div");

  div.className =
    "message";

  div.innerHTML =
    html;

  chat.appendChild(div);

  chat.scrollTop =
    chat.scrollHeight;

}
/* =========================
   OPEN TERMINAL
========================= */

function openTerminal(){

  const html = `

    <div class="section">

      <div class="section-title">
        🖥 AI Terminal
      </div>

      <div class="code-box">

        <div class="code-top">

          <div>
            generated_project
          </div>

        </div>

        <textarea
          id="terminalInput"
          class="editor-area"
          style="height:120px;"
          placeholder="npm install"
        ></textarea>

        <div style="padding:15px;">

          <button
            onclick="runTerminalCommand()"
          >
            ▶ Run Command
          </button>

        </div>

        <pre id="terminalOutput">
Ready...
        </pre>

      </div>

    </div>

  `;

  streamHTML(html);

}

/* =========================
   RUN TERMINAL COMMAND
========================= */

async function runTerminalCommand(){

  const command =
    document.getElementById(
      "terminalInput"
    ).value;

  const output =
    document.getElementById(
      "terminalOutput"
    );

  output.innerText =
    "Running command...";

  const res =
    await fetch(
      "/terminal",
      {

        method:"POST",

        headers:{
          "Content-Type":
          "application/json"
        },

        body:JSON.stringify({
          command
        })

      }
    );

  const data =
    await res.json();

  output.innerText =
    data.output;

}
/* =========================
   SAVE FILE
========================= */

async function saveEditedFile(
  fileName,
  editorId
){

  const content =
    document.getElementById(
      editorId
    ).value;

  const res =
    await fetch(
      "/save-file",
      {

        method:"POST",

        headers:{
          "Content-Type":
          "application/json"
        },

        body:JSON.stringify({

          fileName,
          content

        })

      }
    );

  const data =
    await res.json();

  if(data.success){

    alert(
      "✅ File Saved"
    );

  } else {

    alert(
      "❌ Save Failed"
    );

  }

}

/* =========================
   FILE EXPLORER
========================= */

function renderFileExplorer(files){

  const explorer =
    document.getElementById(
      "fileExplorer"
    );

  explorer.innerHTML = "";

  if(
    !files ||
    files.length === 0
  ){

    explorer.innerHTML = `
      <div class="file-item">
        No files yet
      </div>
    `;

    return;

  }

  files.forEach(file => {

    const div =
      document.createElement("div");

    div.className =
      "file-item";

    div.innerText =
      "📄 " + file.name;

    div.onclick = () => {

      const editorId =
        "editor_" + Date.now();

      const html = `

        <div class="section">

          <div class="section-title">
            ✏ Editing: ${file.name}
          </div>

          <div class="code-box">

            <div class="code-top">

              <div>
                ${file.name}
              </div>

              <button
                class="copy-btn"
                onclick="saveEditedFile(
                  '${file.name}',
                  '${editorId}'
                )"
              >
                💾 Save
              </button>

            </div>

            <textarea
              id="${editorId}"
              class="editor-area"
            >${file.content}</textarea>

          </div>

        </div>

      `;

      streamHTML(html);

    };

    explorer.appendChild(div);

  });

}

/* =========================
   WORKFLOW
========================= */

function updateWorkflowSuggestions(
  projectName
){

  const steps =
    document.getElementById(
      "workflowSteps"
    );

  if(!projectName){

    steps.innerHTML =
      "No suggestions yet";

    return;

  }

  steps.innerHTML = `

    <div class="file-item">
      ✔ Add authentication
    </div>

    <div class="file-item">
      ✔ Create database
    </div>

    <div class="file-item">
      ✔ Improve UI
    </div>

    <div class="file-item">
      ✔ Deploy backend
    </div>

  `;

}

/* =========================
   LOAD ACTIVE PROJECT
========================= */

async function loadActiveProject(){

  try {

    const res =
      await fetch(
        "/get-project-memory"
      );

    const data =
      await res.json();

    if(
      data &&
      data.projectName
    ){

      document.getElementById(
        "activeProjectName"
      ).innerText =
        data.projectName;

      renderFileExplorer(
        data.files
      );

      updateWorkflowSuggestions(
        data.projectName
      );

    }

  } catch(err){

    console.log(err);

  }

}

/* =========================
   RUN AI
========================= */

async function runAI(){

  const prompt =
    document.getElementById(
      "prompt"
    ).value;

  const mode =
    document.getElementById(
      "mode"
    ).value;

  const language =
    document.getElementById(
      "language"
    ).value;

  streamHTML(`

    <div class="section-title">
      🧠 AI Thinking...
    </div>

  `);

  /* =========================
     ANALYZE MODE
  ========================= */

  if(mode === "analyze"){

    const res =
      await fetch("/analyze", {

        method:"POST",

        headers:{
          "Content-Type":
          "application/json"
        },

        body:JSON.stringify({
          code:prompt,
          language
        })

      });

    const data =
      await res.json();

    const codeId =
      "fix_" + Date.now();

    const html = `

      <div class="section">

        <div class="section-title">
          🐞 Problems
        </div>

        <pre>
${(data.issues || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          ⚡ Fixes
        </div>

        <pre>
${(data.fixes || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          📘 Explanation
        </div>

        <pre>
${(data.explanation || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          💻 Fixed Code
        </div>

        <div class="code-box">

          <div class="code-top">

            <div>
              ${language}
            </div>

            <button
              class="copy-btn"
              onclick="copyCode('${codeId}')"
            >
              Copy
            </button>

          </div>

          <pre id="${codeId}">
${data.fixedCode || ""}
          </pre>

        </div>

      </div>

    `;

    streamHTML(html);

    saveHistory(
      "💻 Analysis",
      html
    );

  }

  /* =========================
     PROJECT MODE
  ========================= */

  if(mode === "project"){

    const res =
      await fetch(
        "/generate-project",
        {

          method:"POST",

          headers:{
            "Content-Type":
            "application/json"
          },

          body:JSON.stringify({
            prompt
          })

        }
      );

    const data =
      await res.json();

    document.getElementById(
      "activeProjectName"
    ).innerText =
      data.projectName;

    renderFileExplorer(
      data.files
    );

    updateWorkflowSuggestions(
      data.projectName
    );

    streamHTML(`

      <div class="section">

        <div class="section-title">
          🚀 Project Generated
        </div>

        <pre>
Project:
${data.projectName}

Files:
${data.files.length}
        </pre>

      </div>

    `);

    saveHistory(
      "🏗 " + data.projectName,
      data.projectName
    );

  }

}

/* =========================
   INIT
========================= */

renderHistory();

loadActiveProject();

</script>

</body>
</html>
