<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Dev Mentor Pro</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      height:70px;
      background:#111827;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      border-bottom:1px solid #1f2937;
    }

    .logo{
      font-size:22px;
      font-weight:bold;
    }

    .top-actions{
      display:flex;
      gap:10px;
    }

    .top-btn{
      background:#1f2937;
      border:none;
      color:white;
      padding:10px 16px;
      border-radius:12px;
      cursor:pointer;
    }

    .main{
      flex:1;
      display:flex;
      overflow:hidden;
    }

    .sidebar{
      width:260px;
      background:#111827;
      border-right:1px solid #1f2937;
      padding:20px;
      overflow-y:auto;
    }

    .sidebar h3{
      margin-bottom:20px;
    }

    .menu-btn{
      width:100%;
      background:#1f2937;
      border:none;
      color:white;
      padding:14px;
      border-radius:12px;
      margin-bottom:12px;
      text-align:left;
      cursor:pointer;
      transition:0.2s;
    }

    .menu-btn:hover{
      background:#374151;
    }

    .content{
      flex:1;
      display:flex;
      flex-direction:column;
      height:100%;
    }

    .chat-area{
      flex:1;
      overflow-y:auto;
      padding:30px;
    }

    .welcome{
      text-align:center;
      margin-top:100px;
    }

    .welcome h1{
      font-size:42px;
      margin-bottom:20px;
    }

    .welcome p{
      color:#94a3b8;
      font-size:18px;
    }

    .card-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:16px;
      margin-top:40px;
    }

    .card{
      background:#111827;
      border:1px solid #1f2937;
      padding:20px;
      border-radius:20px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-4px);
      background:#1f2937;
    }

    .message{
      background:#111827;
      border:1px solid #1f2937;
      padding:20px;
      border-radius:20px;
      margin-bottom:20px;
      white-space:pre-wrap;
      line-height:1.6;
    }

    .input-area{
      padding:20px;
      border-top:1px solid #1f2937;
      background:#111827;
    }

    .input-box{
      background:#1f2937;
      border-radius:20px;
      padding:16px;
    }

    textarea{
      width:100%;
      height:120px;
      resize:none;
      background:transparent;
      border:none;
      outline:none;
      color:white;
      font-size:16px;
    }

    .bottom-actions{
      margin-top:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      background:#2563eb;
      color:white;
      padding:12px 18px;
      border-radius:12px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      opacity:0.9;
    }

    select{
      background:#0f172a;
      color:white;
      border:none;
      padding:10px;
      border-radius:10px;
    }

    .typing{
      display:inline-block;
      overflow:hidden;
      border-right:2px solid white;
      white-space:pre-wrap;
      animation:blink 0.7s infinite;
    }

    @keyframes blink{
      50%{
        border-color:transparent;
      }
    }

    @media(max-width:900px){

      .sidebar{
        display:none;
      }

      .welcome h1{
        font-size:28px;
      }

      textarea{
        height:100px;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">

    <div class="logo">
      🚀 AI Dev Mentor Pro
    </div>

    <div class="top-actions">
      <button class="top-btn">⚡ Upgrade</button>
      <button class="top-btn">👤 Profile</button>
    </div>

  </div>

  <div class="main">

    <div class="sidebar">

      <h3>🧠 AI Tools</h3>

      <button class="menu-btn">
        💻 AI Code Analyzer
      </button>

      <button class="menu-btn">
        ⚡ Auto Fix System
      </button>

      <button class="menu-btn">
        🏗 AI Project Generator
      </button>

      <button class="menu-btn">
        📦 Full Stack Builder
      </button>

      <button class="menu-btn">
        🚀 Deploy Assistant
      </button>

      <button class="menu-btn">
        🔒 Security Scanner
      </button>

      <button class="menu-btn">
        🧪 API Tester
      </button>

      <button class="menu-btn">
        🐞 Error Detector
      </button>

    </div>

    <div class="content">

      <div class="chat-area" id="chatArea">

        <div class="welcome">

          <h1>Build Anything with AI</h1>

          <p>
            Debug code, generate projects, fix errors, deploy apps and build complete systems.
          </p>

          <div class="card-grid">

            <div class="card">
              💻 Analyze broken code instantly
            </div>

            <div class="card">
              ⚡ Auto-fix errors with AI
            </div>

            <div class="card">
              🏗 Generate full stack projects
            </div>

            <div class="card">
              🚀 Get deployment instructions
            </div>

          </div>

        </div>

      </div>

      <div class="input-area">

        <div class="input-box">

          <textarea
            id="prompt"
            placeholder="Ask AI to build, debug, fix or generate anything..."
          ></textarea>

          <div class="bottom-actions">

            <select id="mode">
              <option value="analyze">💻 Analyze Code</option>
              <option value="project">🏗 Generate Project</option>
            </select>

            <select id="language">
              <option>javascript</option>
              <option>python</option>
              <option>java</option>
              <option>cpp</option>
            </select>

            <button onclick="analyzeCode()">
              🚀 Analyze
            </button>

            <button onclick="generateProject()">
              🏗 Generate
            </button>

            <button onclick="autoFixCode()">
              ⚡ Auto Fix
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

<script>

let latestFixedCode = "";

function addMessage(title, content){

  const area = document.getElementById("chatArea");

  const div = document.createElement("div");

  div.className = "message";

  div.innerHTML = `
    <h2>${title}</h2>
    <div class="typing">${content}</div>
  `;

  area.appendChild(div);

  area.scrollTop = area.scrollHeight;
}

async function analyzeCode(){

  const code = document.getElementById("prompt").value;

  const language = document.getElementById("language").value;

  addMessage("🧠 AI Thinking...", "Analyzing your code...");

  const res = await fetch("/analyze", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      code,
      language
    })
  });

  const data = await res.json();

  latestFixedCode = data.fixedCode || "";

  addMessage(
    "🐞 Issues",
    (data.issues || []).join("\n\n")
  );

  addMessage(
    "⚡ Fixes",
    (data.fixes || []).join("\n\n")
  );

  addMessage(
    "📘 Explanation",
    (data.explanation || []).join("\n\n")
  );

  addMessage(
    "💻 Fixed Code",
    data.fixedCode || "No fixed code generated"
  );
}

async function generateProject(){

  const idea = document.getElementById("prompt").value;

  addMessage(
    "🏗 AI Architect",
    "Generating complete software architecture..."
  );

  const res = await fetch("/generate-project", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      idea
    })
  });

  const data = await res.json();

  addMessage(
    "📦 Project Name",
    data.projectName || "Unknown"
  );

  addMessage(
    "🗂 Folder Structure",
    data.folderStructure || "Not generated"
  );

  addMessage(
    "🎨 Frontend Code",
    data.frontendCode || "Not generated"
  );

  addMessage(
    "⚙ Backend Code",
    data.backendCode || "Not generated"
  );

  addMessage(
    "📘 Setup Guide",
    data.setupGuide || "Not generated"
  );

  addMessage(
    "🚀 Deploy Guide",
    data.deployGuide || "Not generated"
  );
}

function autoFixCode(){

  if(!latestFixedCode){
    alert("Analyze code first");
    return;
  }

  document.getElementById("prompt").value = latestFixedCode;

  alert("⚡ Code auto-fixed successfully");
}

</script>

</body>
</html>
