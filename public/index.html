<!DOCTYPE html>
<html>
<head>
  <title>AI Code Debugger Pro</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; display:flex; }
    .left { width:40%; padding:20px; }
    .right { width:60%; padding:20px; }
    textarea { width:100%; height:300px; }
    button { width:100%; padding:10px; margin-top:10px; }
    .box { background:#1f2937; padding:10px; margin-bottom:10px; }
  </style>
</head>
<body>

<div class="left">
  <h2>AI Code Editor</h2>

  <select id="lang">
    <option>javascript</option>
    <option>python</option>
    <option>java</option>
    <option>cpp</option>
  </select>

  <textarea id="code"></textarea>

  <button onclick="run()">Analyze Code</button>
</div>

<div class="right">
  <h2>AI Output</h2>

  <div class="box" id="issues">Issues</div>
  <div class="box" id="fixes">Fixes</div>
  <div class="box" id="explanation">Explanation</div>
  <div class="box" id="fixed">Fixed Code</div>
</div>

<script>
async function run() {
  let code = document.getElementById("code").value;
  let language = document.getElementById("lang").value;

  let res = await fetch("/analyze", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ code, language })
  });

  let data = await res.json();

  document.getElementById("issues").innerText =
    "Issues:\n" + (data.issues?.join("\n") || "None");

  document.getElementById("fixes").innerText =
    "Fixes:\n" + (data.fixes?.join("\n") || "None");

  document.getElementById("explanation").innerText =
    "Explanation:\n" + (data.explanation?.join("\n") || "None");

  document.getElementById("fixed").innerText =
    "Fixed Code:\n" + (data.fixedCode || "Not generated");
}
</script>

</body>
</html>
