<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI Dev Mentor Pro</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.topbar{
  background:#111827;
  padding:18px 24px;
  border-bottom:1px solid #1f2937;
  font-size:24px;
  font-weight:bold;
}

.main{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.welcome{
  text-align:center;
  margin-top:60px;
}

.welcome h1{
  font-size:42px;
  margin-bottom:15px;
}

.welcome p{
  color:#94a3b8;
  font-size:18px;
}

.input-area{
  background:#111827;
  border-top:1px solid #1f2937;
  padding:20px;
}

textarea{
  width:100%;
  height:130px;
  background:#1f2937;
  border:none;
  outline:none;
  resize:none;
  color:white;
  padding:18px;
  border-radius:18px;
  font-size:16px;
}

.controls{
  margin-top:15px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

button{
  border:none;
  background:#2563eb;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.9;
}

select{
  background:#1f2937;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
}

.message{
  background:#111827;
  border:1px solid #1f2937;
  padding:22px;
  border-radius:20px;
  margin-bottom:22px;
}

.section{
  margin-top:22px;
}

.section-title{
  font-size:20px;
  margin-bottom:12px;
  color:#60a5fa;
}

.code-box{
  background:#020617;
  border:1px solid #334155;
  border-radius:16px;
  overflow:hidden;
  margin-top:12px;
}

.code-top{
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid #1f2937;
}

.copy-btn{
  background:#2563eb;
  padding:8px 12px;
  border-radius:10px;
  font-size:14px;
}

pre{
  overflow-x:auto;
  padding:18px;
  white-space:pre-wrap;
  line-height:1.6;
  color:#e2e8f0;
}

.download-btn{
  display:inline-block;
  margin-top:18px;
  text-decoration:none;
  background:#16a34a;
  color:white;
  padding:14px 20px;
  border-radius:12px;
  font-weight:bold;
}

.typing{
  opacity:0.8;
}

@media(max-width:768px){

  .welcome h1{
    font-size:30px;
  }

  textarea{
    height:110px;
  }

}

</style>

</head>

<body>

<div class="topbar">
  🚀 AI Dev Mentor Pro
</div>

<div class="main" id="chat">

  <div class="welcome">

    <h1>Build Anything with AI</h1>

    <p>
      Debug code, generate projects, fix errors and build complete systems.
    </p>

  </div>

</div>

<div class="input-area">

  <textarea
    id="prompt"
    placeholder="Ask AI to build, debug or generate anything..."
  ></textarea>

  <div class="controls">

    <select id="mode">
      <option value="analyze">💻 Analyze Code</option>
      <option value="project">🏗 Generate Project</option>
    </select>

    <select id="language">
      <option>javascript</option>
      <option>python</option>
      <option>java</option>
      <option>cpp</option>
    </select>

    <button onclick="runAI()">
      🚀 Run AI
    </button>

  </div>

</div>

<script>

function copyCode(id){

  const text = document.getElementById(id).innerText;

  navigator.clipboard.writeText(text);

  alert("✅ Code copied");
}

function addHTML(html){

  const chat = document.getElementById("chat");

  const div = document.createElement("div");

  div.className = "message";

  div.innerHTML = html;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}

async function runAI(){

  const prompt = document.getElementById("prompt").value;

  const mode = document.getElementById("mode").value;

  const language = document.getElementById("language").value;

  addHTML(`
    <div class="typing">
      🧠 AI is thinking...
    </div>
  `);

  if(mode === "analyze"){

    const res = await fetch("/analyze", {

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        code:prompt,
        language
      })

    });

    const data = await res.json();

    const fixedId = "fixedCode_" + Date.now();

    addHTML(`

      <div class="section">

        <div class="section-title">
          🐞 Problems Found
        </div>

        <pre>
${(data.issues || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          ⚡ Best Fixes
        </div>

        <pre>
${(data.fixes || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          📘 Explanation
        </div>

        <pre>
${(data.explanation || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          💻 Final Corrected Code
        </div>

        <div class="code-box">

          <div class="code-top">

            <div>
              ${language}
            </div>

            <button
              class="copy-btn"
              onclick="copyCode('${fixedId}')"
            >
              Copy
            </button>

          </div>

          <pre id="${fixedId}">
${data.fixedCode || "No fixed code generated"}
          </pre>

        </div>

      </div>

    `);

  }

  if(mode === "project"){

    const res = await fetch("/generate-project", {

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        idea:prompt
      })

    });

    const data = await res.json();

    let filesHTML = "";

    (data.files || []).forEach((file,index) => {

      const fileId = "file_" + index + "_" + Date.now();

      filesHTML += `

        <div class="section">

          <div class="section-title">
            📄 ${file.name}
          </div>

          <div class="code-box">

            <div class="code-top">

              <div>
                Source File
              </div>

              <button
                class="copy-btn"
                onclick="copyCode('${fileId}')"
              >
                Copy
              </button>

            </div>

            <pre id="${fileId}">
${file.content}
            </pre>

          </div>

        </div>

      `;
    });

    addHTML(`

      <div class="section">

        <div class="section-title">
          📦 Project Overview
        </div>

        <pre>
${data.projectName}
        </pre>

      </div>

      ${filesHTML}

      <div class="section">

        <div class="section-title">
          📘 Setup Guide
        </div>

        <pre>
${data.setupGuide}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          🌍 Deploy Guide
        </div>

        <pre>
${data.deployGuide}
        </pre>

      </div>

      <a
        class="download-btn"
        href="/download-project"
      >
        ⬇ Download ZIP Project
      </a>

    `);

  }

}

</script>

</body>
</html>
