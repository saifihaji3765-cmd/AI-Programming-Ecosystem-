<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI Dev Mentor Pro</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  height:100vh;
  display:flex;
}

.sidebar{
  width:280px;
  background:#111827;
  border-right:1px solid #1f2937;
  display:flex;
  flex-direction:column;
}

.logo{
  padding:22px;
  font-size:24px;
  font-weight:bold;
  border-bottom:1px solid #1f2937;
}

.history{
  flex:1;
  overflow-y:auto;
  padding:18px;
}

.history-title{
  color:#60a5fa;
  margin-bottom:18px;
  font-size:18px;
}

.history-item{
  background:#1f2937;
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.2s;
}

.history-item:hover{
  background:#374151;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.welcome{
  text-align:center;
  margin-top:80px;
}

.welcome h1{
  font-size:42px;
  margin-bottom:14px;
}

.welcome p{
  color:#94a3b8;
  font-size:18px;
}

.input-area{
  background:#111827;
  border-top:1px solid #1f2937;
  padding:20px;
}

textarea{
  width:100%;
  height:130px;
  background:#1f2937;
  color:white;
  border:none;
  outline:none;
  resize:none;
  border-radius:18px;
  padding:18px;
  font-size:16px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

button{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.9;
}

select{
  background:#1f2937;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
}

.message{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:20px;
  padding:22px;
  margin-bottom:22px;
}

.section{
  margin-top:24px;
}

.section-title{
  color:#60a5fa;
  font-size:20px;
  margin-bottom:12px;
}

.code-box{
  background:#020617;
  border:1px solid #334155;
  border-radius:16px;
  overflow:hidden;
}

.code-top{
  background:#111827;
  border-bottom:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
}

.copy-btn{
  background:#2563eb;
  padding:8px 12px;
  border-radius:10px;
  font-size:14px;
}

pre{
  overflow-x:auto;
  white-space:pre-wrap;
  line-height:1.6;
  padding:18px;
  color:#e2e8f0;
}

.download-btn{
  display:inline-block;
  background:#16a34a;
  color:white;
  text-decoration:none;
  padding:14px 20px;
  border-radius:12px;
  margin-top:20px;
  font-weight:bold;
}

.active-project-box{
  background:#0f172a;
  border:1px solid #334155;
  padding:16px;
  border-radius:14px;
  margin-bottom:18px;
}

.active-project-title{
  color:#22c55e;
  margin-bottom:10px;
  font-size:18px;
}

@media(max-width:900px){

  .sidebar{
    display:none;
  }

  .welcome h1{
    font-size:30px;
  }

}

</style>

</head>

<body>

<div class="sidebar">

  <div class="logo">
    🚀 AI Dev Mentor
  </div>

  <div class="history">

    <div class="active-project-box">

      <div class="active-project-title">
        🟢 Active Project
      </div>

      <div id="activeProjectName">
        No active project
      </div>

    </div>

    <div class="history-title">
      📂 Previous Projects
    </div>

    <div id="historyList"></div>

  </div>

</div>

<div class="main">

  <div class="chat" id="chat">

    <div class="welcome">

      <h1>Build Anything with AI</h1>

      <p>
        Debug code, generate projects and build complete software systems.
      </p>

    </div>

  </div>

  <div class="input-area">

    <textarea
      id="prompt"
      placeholder="Ask AI to build or review anything..."
    ></textarea>

    <div class="controls">

      <select id="mode">

        <option value="analyze">
          💻 Analyze Code
        </option>

        <option value="project">
          🏗 Generate Project
        </option>

        <option value="review">
          🧠 Engineering Review
        </option>

      </select>

      <select id="language">

        <option>javascript</option>
        <option>python</option>
        <option>java</option>
        <option>cpp</option>

      </select>

      <button onclick="runAI()">
        🚀 Run AI
      </button>

      <button onclick="clearHistory()">
        🗑 Clear History
      </button>

    </div>

  </div>

</div>

<script>

let historyData = JSON.parse(
  localStorage.getItem("ai_history")
) || [];

/* =========================
   SAVE HISTORY
========================= */

function saveHistory(title,content){

  historyData.unshift({
    title,
    content
  });

  localStorage.setItem(
    "ai_history",
    JSON.stringify(historyData)
  );

  renderHistory();

}

/* =========================
   RENDER HISTORY
========================= */

function renderHistory(){

  const list =
    document.getElementById("historyList");

  list.innerHTML = "";

  historyData.forEach(item => {

    const div =
      document.createElement("div");

    div.className = "history-item";

    div.innerText = item.title;

    div.onclick = () => {

      addHTML(item.content);

    };

    list.appendChild(div);

  });

}

/* =========================
   CLEAR HISTORY
========================= */

function clearHistory(){

  localStorage.removeItem("ai_history");

  historyData = [];

  renderHistory();

  alert("History cleared");

}

/* =========================
   COPY CODE
========================= */

function copyCode(id){

  const text =
    document.getElementById(id).innerText;

  navigator.clipboard.writeText(text);

  alert("Code copied");

}

/* =========================
   ADD HTML
========================= */

function addHTML(html){

  const chat =
    document.getElementById("chat");

  const div =
    document.createElement("div");

  div.className = "message";

  div.innerHTML = html;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

}

/* =========================
   LOAD ACTIVE PROJECT
========================= */

async function loadActiveProject(){

  try {

    const res = await fetch(
      "/get-project-memory"
    );

    const data = await res.json();

    if(
      data &&
      data.projectName &&
      data.files &&
      data.files.length > 0
    ){

      document.getElementById(
        "activeProjectName"
      ).innerText = data.projectName;

    }

  } catch (err) {

    console.log(err);

  }

}

/* =========================
   RUN AI
========================= */

async function runAI(){

  const prompt =
    document.getElementById("prompt").value;

  const mode =
    document.getElementById("mode").value;

  const language =
    document.getElementById("language").value;

  addHTML(`

    <div class="section-title">
      🧠 AI is thinking...
    </div>

  `);

  /* =========================
     ANALYZE MODE
  ========================= */

  if(mode === "analyze"){

    const res = await fetch("/analyze", {

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        code:prompt,
        language
      })

    });

    const data = await res.json();

    const fixedId =
      "fixed_" + Date.now();

    const html = `

      <div class="section">

        <div class="section-title">
          🐞 Problems Found
        </div>

        <pre>
${(data.issues || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          ⚡ Best Fixes
        </div>

        <pre>
${(data.fixes || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          📘 Explanation
        </div>

        <pre>
${(data.explanation || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          💻 Final Corrected Code
        </div>

        <div class="code-box">

          <div class="code-top">

            <div>
              ${language}
            </div>

            <button
              class="copy-btn"
              onclick="copyCode('${fixedId}')"
            >
              Copy
            </button>

          </div>

          <pre id="${fixedId}">
${data.fixedCode || "No fixed code generated"}
          </pre>

        </div>

      </div>

    `;

    addHTML(html);

    saveHistory(
      "🐞 Code Analysis",
      html
    );

  }

  /* =========================
     ENGINEERING REVIEW MODE
  ========================= */

  if(mode === "review"){

    const res = await fetch(
      "/engineering-review",
      {

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          code:prompt,
          language
        })

      }
    );

    const data = await res.json();

    const html = `

      <div class="section">

        <div class="section-title">
          🔒 Security Issues
        </div>

        <pre>
${(data.securityIssues || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          ⚡ Performance Issues
        </div>

        <pre>
${(data.performanceIssues || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          📈 Scalability Review
        </div>

        <pre>
${(data.scalabilityIssues || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          🏗 Architecture Review
        </div>

        <pre>
${(data.architectureReview || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          ✅ Best Practices
        </div>

        <pre>
${(data.bestPractices || []).join("\n\n")}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          🚀 Production Recommendations
        </div>

        <pre>
${(data.productionRecommendations || []).join("\n\n")}
        </pre>

      </div>

    `;

    addHTML(html);

    saveHistory(
      "🧠 Engineering Review",
      html
    );

  }

  /* =========================
     PROJECT MODE
  ========================= */

  if(mode === "project"){

    const res = await fetch(
      "/generate-project",
      {

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          idea:prompt
        })

      }
    );

    const data = await res.json();

    document.getElementById(
      "activeProjectName"
    ).innerText =
      data.projectName || "Unnamed Project";

    let filesHTML = "";

    (data.files || []).forEach((file,index) => {

      const fileId =
        "file_" +
        index +
        "_" +
        Date.now();

      filesHTML += `

        <div class="section">

          <div class="section-title">
            📄 ${file.name}
          </div>

          <div class="code-box">

            <div class="code-top">

              <div>
                Source File
              </div>

              <button
                class="copy-btn"
                onclick="copyCode('${fileId}')"
              >
                Copy
              </button>

            </div>

            <pre id="${fileId}">
${file.content}
            </pre>

          </div>

        </div>

      `;
    });

    const html = `

      <div class="section">

        <div class="section-title">
          📦 Project Overview
        </div>

        <pre>
${data.projectName}
        </pre>

      </div>

      ${filesHTML}

      <div class="section">

        <div class="section-title">
          📘 Setup Guide
        </div>

        <pre>
${data.setupGuide}
        </pre>

      </div>

      <div class="section">

        <div class="section-title">
          🌍 Deploy Guide
        </div>

        <pre>
${data.deployGuide}
        </pre>

      </div>

      <a
        class="download-btn"
        href="/download-project"
      >
        ⬇ Download ZIP Project
      </a>

    `;

    addHTML(html);

    saveHistory(
      data.projectName || "Generated Project",
      html
    );

  }

}

/* =========================
   INIT
========================= */

renderHistory();

loadActiveProject();

</script>

</body>

</html>
