<!DOCTYPE html>
<html>
<head>
  <title>AI Dev Mentor Pro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      height: 100vh;
    }

    .left {
      width: 40%;
      padding: 20px;
      background: #111827;
    }

    .right {
      width: 60%;
      padding: 20px;
      overflow-y: auto;
    }

    textarea {
      width: 100%;
      height: 300px;
      background: #1f2937;
      color: white;
      border: none;
      padding: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      cursor: pointer;
    }

    .box {
      background: #1f2937;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    .typing::after {
      content: " |";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="left">
  <h2>💻 AI Code Editor</h2>

  <select id="lang">
    <option>javascript</option>
    <option>python</option>
    <option>java</option>
    <option>cpp</option>
  </select>

  <textarea id="code" placeholder="Paste your code..."></textarea>

  <button onclick="analyze()">🚀 Analyze Code</button>
  <button onclick="autoFix()">⚡ Auto Fix Code</button>
</div>

<div class="right">
  <h2>🧠 AI Output</h2>

  <div class="box" id="issues">Issues...</div>
  <div class="box" id="fixes">Fixes...</div>
  <div class="box" id="explanation">Explanation...</div>
  <div class="box typing" id="fixed">Fixed Code...</div>
</div>

<script>
let lastResult = null;

async function analyze() {
  let code = document.getElementById("code").value;
  let language = document.getElementById("lang").value;

  let res = await fetch("/analyze", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ code, language })
  });

  let data = await res.json();
  lastResult = data;

  typeWriter("issues", data.issues?.join("\n") || "None");
  typeWriter("fixes", data.fixes?.join("\n") || "None");
  typeWriter("explanation", data.explanation?.join("\n") || "None");
  typeWriter("fixed", data.fixedCode || "Not generated");
}

function autoFix() {
  if (!lastResult?.fixedCode) return alert("First analyze code");

  document.getElementById("code").value = lastResult.fixedCode;
  alert("Code Auto Fixed ⚡");
}

function typeWriter(id, text) {
  let i = 0;
  let el = document.getElementById(id);
  el.innerHTML = "";

  function typing() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 10);
    }
  }

  typing();
}
</script>

</body>
</html>
